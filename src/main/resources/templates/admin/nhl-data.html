<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"
>
<head>
    <title>NHL Data Collection</title>
</head>
<body>
<section layout:fragment="content">
    <div class="container mt-4">
        <h1>NHL Data Collection</h1>

        <div th:if="${successMessage}" class="alert alert-success" role="alert">
            <span th:text="${successMessage}">Success message</span>
        </div>

        <div class="card mt-4">
            <div class="card-body">
                <h5 class="card-title">Collect Season Data</h5>

                <form th:action="@{/admin/nhl-data/collect}" method="post">
                    <div class="mb-3">
                        <label for="seasonSelect" class="form-label">Select Season</label>
                        <select class="form-select" id="seasonSelect" name="seasonId" required>
                            <option value="" disabled selected>Choose a season...</option>
                            <option th:each="season : ${seasons}"
                                    th:value="${season.id}"
                                    th:text="${season.formattedSeasonId} + ' (' + ${season.startDate} + ' to ' + ${season.endDate} + ')'">
                            </option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Collect Data</button>
                </form>

                <div th:if="${#lists.isEmpty(seasons)}" class="alert alert-warning mt-3" role="alert">
                    No seasons available. Please populate seasons first.
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
