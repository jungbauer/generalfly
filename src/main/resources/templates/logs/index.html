<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="en"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Logs</title>
    <link rel="stylesheet" th:href="@{/css/generalTable.css}"/>
</head>
<body>
<div layout:fragment="content" class="container">
    <h2>Application Logs</h2>
    <p th:text="'Total entries: ' + ${totalItems}">count</p>
    <p th:if="${#lists.isEmpty(logs)}">No logs available</p>
    <table th:unless="${#lists.isEmpty(logs)}" class="tg tg-striped">
        <thead>
        <tr>
            <th>Created</th>
            <th>File</th>
            <th>Method</th>
            <th>Message</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="log : ${logs}">
            <td th:text="${#temporals.format(log.createdOn, 'yyyy-MM-dd HH:mm:ss')}">created</td>
            <td th:text="${log.file}">file</td>
            <td th:text="${log.method}">method</td>
            <td th:text="${log.message}">message</td>
        </tr>
        </tbody>
    </table>

    <!-- Pagination -->
    <nav th:if="${totalPages > 1}" aria-label="Page navigation">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/logs(page=${currentPage - 1})}" aria-label="Previous">
                    <span aria-hidden="true">&laquo; Previous</span>
                </a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/logs(page=${i})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                <a class="page-link" th:href="@{/logs(page=${currentPage + 1})}" aria-label="Next">
                    <span aria-hidden="true">Next &raquo;</span>
                </a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
